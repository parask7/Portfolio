<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paras Kukreja | Game Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0a0a0a;
  font-family: monospace;
  color: white;
}

/* GAME WORLD */
#game {
  width: 2000px;
  height: 2000px;
  position: relative;
  background: radial-gradient(#111, #000);
}

/* PLAYER (CAR) */
#player {
  width: 40px;
  height: 20px;
  background: cyan;
  position: absolute;
  top: 1000px;
  left: 1000px;
  transform-origin: center;
}

/* ZONES */
.zone {
  position: absolute;
  width: 200px;
  height: 200px;
  border: 2px solid #00f0ff;
  display: flex;
  justify-content: center;
  align-items: center;
}

.zone:hover {
  background: rgba(0,255,255,0.1);
}

/* CAMERA VIEWPORT */
#viewport {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* UI PANEL */
#panel {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 300px;
  background: rgba(0,0,0,0.8);
  border: 1px solid cyan;
  padding: 15px;
  display: none;
}

/* TITLE */
#title {
  position: fixed;
  top: 20px;
  left: 20px;
  color: cyan;
}

</style>
</head>

<body>

<div id="title">PARAS KUKREJA | DRIVE TO EXPLORE</div>

<div id="viewport">
  <div id="game">

    <div id="player"></div>

    <!-- ZONES -->
    <div class="zone" style="top:300px; left:300px;" data-info="Unity Game Programmer. Focus: Gameplay Systems, AI, C#.">
      ABOUT
    </div>

    <div class="zone" style="top:1500px; left:300px;" data-info="Skills: Unity, C#, FSM, Physics, Input Systems">
      SKILLS
    </div>

    <div class="zone" style="top:300px; left:1500px;" data-info="Projects: Magic Snake, Car Controller, Space Shooter">
      PROJECTS
    </div>

    <div class="zone" style="top:1500px; left:1500px;" data-info="Contact: github.com/parask7">
      CONTACT
    </div>

  </div>
</div>

<div id="panel"></div>

<script>
const player = document.getElementById("player");
const game = document.getElementById("game");
const panel = document.getElementById("panel");

let x = 1000, y = 1000;
let speed = 5;

/* MOVEMENT */
document.addEventListener("keydown", (e) => {
  if (e.key === "w") y -= speed;
  if (e.key === "s") y += speed;
  if (e.key === "a") x -= speed;
  if (e.key === "d") x += speed;

  player.style.left = x + "px";
  player.style.top = y + "px";

  updateCamera();
  checkZones();
});

/* CAMERA FOLLOW */
function updateCamera() {
  window.scrollTo(x - window.innerWidth / 2, y - window.innerHeight / 2);
}

/* ZONE DETECTION */
function checkZones() {
  document.querySelectorAll(".zone").forEach(zone => {
    const rect = zone.getBoundingClientRect();
    const playerRect = player.getBoundingClientRect();

    if (
      playerRect.left < rect.right &&
      playerRect.right > rect.left &&
      playerRect.top < rect.bottom &&
      playerRect.bottom > rect.top
    ) {
      panel.style.display = "block";
      panel.innerText = zone.dataset.info;
    }
  });
}
</script>

</body>
</html>
